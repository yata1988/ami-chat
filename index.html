<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<title>ami chat - やさしいAIお話し相手</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; overflow: hidden; font-family: 'Hiragino Kaku Gothic ProN', sans-serif; background: linear-gradient(135deg, #fdf8f0 0%, #faf4e8 50%, #f5ede0 100%); }
  #app { display: flex; flex-direction: column; height: 100vh; height: 100dvh; }
  header { display: flex; align-items: center; justify-content: space-between; padding: 10px 16px; background: rgba(255,255,255,0.6); backdrop-filter: blur(8px); border-bottom: 1px solid #f5e6cc; flex-shrink: 0; }
  .header-left { display: flex; align-items: center; gap: 8px; }
  .avatar { width: 32px; height: 32px; border-radius: 50%; background: #fde68a; display: flex; align-items: center; justify-content: center; font-size: 16px; }
  .header-title { font-size: 15px; font-weight: bold; color: #44403c; line-height: 1; }
  .header-sub { font-size: 10px; color: #a8a29e; }
  .status-dot { width: 8px; height: 8px; border-radius: 50%; background: #d6d3d1; transition: background 0.3s; }
  .status-dot.active { background: #34d399; }
  .status-text { font-size: 11px; color: #a8a29e; }
  #chat { flex: 1; overflow-y: auto; padding: 12px 16px; display: flex; flex-direction: column; gap: 10px; }
  #chat::-webkit-scrollbar { display: none; }
  .msg { display: flex; align-items: flex-start; gap: 8px; }
  .msg.user { flex-direction: row-reverse; }
  .bubble { max-width: 78%; padding: 10px 14px; border-radius: 18px; font-size: 14px; line-height: 1.6; color: #44403c; }
  .msg.user .bubble { background: #fef3c7; border-top-right-radius: 4px; }
  .msg.ami .bubble { background: white; border-top-left-radius: 4px; border: 1px solid #f5f5f4; box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
  .msg-avatar { width: 28px; height: 28px; border-radius: 50%; background: #fde68a; display: flex; align-items: center; justify-content: center; font-size: 13px; flex-shrink: 0; margin-top: 2px; }
  .empty-msg { display: flex; align-items: center; justify-content: center; flex: 1; color: #a8a29e; font-size: 13px; text-align: center; line-height: 1.8; padding: 0 32px; }
  #visualizer-area { flex-shrink: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px 0 12px; gap: 12px; }
  .circle-wrap { position: relative; width: 180px; height: 180px; display: flex; align-items: center; justify-content: center; }
  .ripple { position: absolute; inset: 0; border-radius: 50%; border: 2px solid #fbbf24; opacity: 0; }
  .ripple.active { animation: ripple 1.8s ease-out infinite; }
  .ripple:nth-child(2) { animation-delay: 0.5s; }
  .ripple:nth-child(3) { animation-delay: 1s; }
  @keyframes ripple { 0% { transform: scale(0.85); opacity: 0.7; } 100% { transform: scale(1.8); opacity: 0; } }
  #main-btn { width: 140px; height: 140px; border-radius: 50%; border: 3px solid #fde68a; background: #fffbeb; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 6px; cursor: pointer; transition: all 0.2s; box-shadow: 0 4px 20px rgba(251,191,36,0.2); -webkit-tap-highlight-color: transparent; user-select: none; touch-action: manipulation; }
  #main-btn:active { transform: scale(0.95); }
  #main-btn.listening { background: #fff1f2; border-color: #fda4af; animation: breathe 2s ease-in-out infinite; }
  #main-btn.thinking { background: #f5f3ff; border-color: #c4b5fd; }
  #main-btn.speaking { background: #f0fdf4; border-color: #86efac; }
  @keyframes breathe { 0%,100% { transform: scale(1); } 50% { transform: scale(1.05); } }
  .btn-icon { font-size: 44px; line-height: 1; pointer-events: none; }
  .wave-bars { display: flex; align-items: flex-end; gap: 3px; height: 20px; pointer-events: none; }
  .bar { width: 4px; border-radius: 2px; background: #f87171; }
  .bar.green { background: #4ade80; }
  @keyframes wave { 0%,100% { transform: scaleY(1); } 50% { transform: scaleY(1.8); } }
  .state-label { font-size: 13px; color: #78716c; font-weight: 500; }
  #ad-banner { flex-shrink: 0; height: 50px; background: #fafaf9; border-top: 1px solid #f5f5f4; display: flex; align-items: center; justify-content: center; gap: 8px; }
  .ad-tag { font-size: 10px; background: #e7e5e4; color: #78716c; padding: 2px 6px; border-radius: 3px; }
  .ad-text { font-size: 11px; color: #a8a29e; }
  footer { flex-shrink: 0; display: flex; align-items: center; justify-content: center; gap: 12px; padding: 6px; background: rgba(255,255,255,0.3); border-top: 1px solid #fef3c7; }
  footer a { font-size: 10px; color: #a8a29e; text-decoration: none; }
  footer span { color: #d6d3d1; font-size: 10px; }
</style>
</head>
<body>
<div id="app">
  <header>
    <div class="header-left">
      <div class="avatar">🌸</div>
      <div>
        <div class="header-title">ami</div>
        <div class="header-sub">やさしいAIお話し相手</div>
      </div>
    </div>
    <div style="display:flex;align-items:center;gap:6px">
      <div class="status-dot" id="statusDot"></div>
      <span class="status-text" id="statusText">スタンバイ</span>
    </div>
  </header>

  <div id="chat">
    <div class="empty-msg" id="emptyMsg">ボタンをタップして<br>話しかけてみて✨<br>amiがいつでも聞いてるよ</div>
  </div>

  <div id="visualizer-area">
    <div class="circle-wrap">
      <div class="ripple" id="r1"></div>
      <div class="ripple" id="r2"></div>
      <div class="ripple" id="r3"></div>
      <button id="main-btn">
        <div class="btn-icon" id="btnIcon">🎙️</div>
        <div class="wave-bars" id="waveBars" style="display:none">
          <div class="bar" style="height:8px;animation:wave 0.6s infinite"></div>
          <div class="bar" style="height:14px;animation:wave 0.7s 0.1s infinite"></div>
          <div class="bar" style="height:10px;animation:wave 0.5s 0.2s infinite"></div>
          <div class="bar" style="height:16px;animation:wave 0.8s 0.05s infinite"></div>
          <div class="bar" style="height:8px;animation:wave 0.6s 0.15s infinite"></div>
        </div>
      </button>
    </div>
    <div class="state-label" id="stateLabel">タップして話す</div>
  </div>

  <div id="ad-banner">
    <span class="ad-tag">広告</span>
    <span class="ad-text">Google AdSense 広告エリア</span>
  </div>

  <footer>
    <a href="#">プライバシーポリシー</a>
    <span>|</span>
    <a href="#">利用規約</a>
    <span>|</span>
    <a href="#">遊び方</a>
  </footer>
</div>

<script>
const GEMINI_API_KEY = 'AIzaSyCdDK1cxKuQsJjSRCfJCsl-xipSOa5Pqlk';

const SYSTEM_PROMPT = `あなたは「ami（アミ）」という名前の、優しくて聞き上手な友達AIです。
性格：明るく、共感力が高い。話し方：タメ口、親しみやすい日本語。
口癖：「うんうん」「そうだね」「それで？」「わかるわかる」などの相槌を自然に入れる。
返答は短め（2〜4文）。まず共感・相槌から入り、最後は軽い質問で終わる。
音声で読み上げることを意識した自然な話し言葉にする。`;

let state = 'idle';
let recognition = null;
let chatHistory = [];
let isRecognizing = false;

async function acquireWakeLock() {
  if ('wakeLock' in navigator) {
    try { await navigator.wakeLock.request('screen'); } catch(e) {}
  }
}
acquireWakeLock();
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'visible') acquireWakeLock();
});

function setState(s) {
  state = s;
  const btn = document.getElementById('main-btn');
  const icon = document.getElementById('btnIcon');
  const bars = document.getElementById('waveBars');
  const label = document.getElementById('stateLabel');
  const dot = document.getElementById('statusDot');
  const r1 = document.getElementById('r1');
  const r2 = document.getElementById('r2');
  const r3 = document.getElementById('r3');

  btn.className = s !== 'idle' ? s : '';
  dot.className = 'status-dot' + (s !== 'idle' ? ' active' : '');
  bars.style.display = (s === 'listening' || s === 'speaking') ? 'flex' : 'none';

  const barEls = bars.querySelectorAll('.bar');
  barEls.forEach(b => { b.className = 'bar' + (s === 'speaking' ? ' green' : ''); });
  [r1, r2, r3].forEach(r => r.className = 'ripple' + (s === 'listening' || s === 'speaking' ? ' active' : ''));

  const configs = {
    idle:      { icon: '🎙️', label: 'タップして話す',   status: 'スタンバイ' },
    listening: { icon: '👂',  label: '聞いてるよ...',    status: 'アクティブ' },
    thinking:  { icon: '💭',  label: 'amiが考え中...',   status: 'アクティブ' },
    speaking:  { icon: '💬',  label: 'amiが話してるよ', status: 'アクティブ' },
  };
  const c = configs[s];
  icon.textContent = c.icon;
  label.textContent = c.label;
  document.getElementById('statusText').textContent = c.status;
}

function addMessage(role, text) {
  const chat = document.getElementById('chat');
  const empty = document.getElementById('emptyMsg');
  if (empty) empty.remove();
  const div = document.createElement('div');
  div.className = 'msg ' + (role === 'user' ? 'user' : 'ami');
  if (role === 'ami') {
    div.innerHTML = `<div class="msg-avatar">🌸</div><div class="bubble">${text}</div>`;
  } else {
    div.innerHTML = `<div class="bubble">${text}</div>`;
  }
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
  chatHistory.push({ role: role === 'user' ? 'user' : 'model', parts: [{ text }] });
}

function speak(text) {
  if (!('speechSynthesis' in window)) { setState('idle'); return; }
  window.speechSynthesis.cancel();
  const utter = new SpeechSynthesisUtterance(text);
  utter.lang = 'ja-JP';
  utter.rate = 1.05;
  utter.pitch = 1.1;
  const voices = window.speechSynthesis.getVoices();
  const jaVoice = voices.find(v => v.lang.includes('ja'));
  if (jaVoice) utter.voice = jaVoice;
  utter.onstart = () => setState('speaking');
  utter.onend = () => setState('idle');
  utter.onerror = () => setState('idle');
  window.speechSynthesis.speak(utter);
}

async function askGemini(userText) {
  setState('thinking');
  try {
    const messages = [...chatHistory.slice(-10)];
    const res = await fetch(
      `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${GEMINI_API_KEY}`,
      {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          system_instruction: { parts: [{ text: SYSTEM_PROMPT }] },
          contents: messages,
          generationConfig: { temperature: 0.9, maxOutputTokens: 200 }
        })
      }
    );
    const data = await res.json();
    const reply = data.candidates?.[0]?.content?.parts?.[0]?.text || 'ごめん、うまく聞き取れなかった。もう一回話してみて！';
    addMessage('ami', reply);
    speak(reply);
  } catch(e) {
    const err = 'ごめん、ちょっと調子悪いみたい。もう一度試してみて！';
    addMessage('ami', err);
    speak(err);
  }
}

// ★ Safari対応：タップで開始・もう一度タップで停止
function toggleListen() {
  if (state === 'thinking' || state === 'speaking') return;

  if (isRecognizing) {
    // 停止
    if (recognition) recognition.stop();
    return;
  }

  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) {
    alert('音声認識に対応していません。iPhoneのSafariをお使いください。');
    return;
  }

  recognition = new SR();
  recognition.lang = 'ja-JP';
  recognition.continuous = false;
  recognition.interimResults = false;

  let finalText = '';

  recognition.onstart = () => {
    isRecognizing = true;
    setState('listening');
  };

  recognition.onresult = (e) => {
    for (let i = e.resultIndex; i < e.results.length; i++) {
      if (e.results[i].isFinal) finalText += e.results[i][0].transcript;
    }
  };

  recognition.onend = () => {
    isRecognizing = false;
    if (finalText.trim()) {
      addMessage('user', finalText.trim());
      askGemini(finalText.trim());
    } else {
      setState('idle');
    }
  };

  recognition.onerror = (e) => {
    isRecognizing = false;
    console.error('音声認識エラー:', e.error);
    setState('idle');
    if (e.error === 'not-allowed') {
      alert('マイクの使用が許可されていません。設定→Safari→マイクを確認してください。');
    }
  };

  recognition.start();
}

document.getElementById('main-btn').addEventListener('click', toggleListen);

window.addEventListener('load', () => {
  window.speechSynthesis.getVoices();
  setTimeout(() => {
    const greeting = 'やあ！amiだよ。今日はどんなこと話したい？';
    addMessage('ami', greeting);
    speak(greeting);
  }, 800);
});
</script>
</body>
</html>
